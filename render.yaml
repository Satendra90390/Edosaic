services:
  - type: web
    name: sms-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn sms_django.wsgi:application
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"
