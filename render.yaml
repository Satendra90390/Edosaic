services:
  - type: web
    name: sms-pro
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn sms_django.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"

  - type: postgres
    name: sms-db
    plan: free
    databaseName: sms_pro
